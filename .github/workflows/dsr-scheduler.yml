name: DSR & Inactivity Alert Scheduler

on:
  schedule:
    # Runs every 30 minutes — all cron endpoints check the current IST slot internally.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # allow manual trigger from GitHub UI

jobs:
  trigger-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DSR scheduler cron
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://backend-gamma-nine-32.vercel.app/api/reports/scheduler-cron)
          echo "DSR scheduler response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "DSR scheduler cron returned non-200 status: $STATUS"
            exit 1
          fi

      - name: Trigger role-based daily DSR cron (9:00 PM IST)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://backend-gamma-nine-32.vercel.app/api/reports/role-dsr-cron)
          echo "Role DSR cron response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Role DSR cron returned non-200 status: $STATUS"
            exit 1
          fi

      - name: Trigger comprehensive inactivity cron (10:30 AM IST)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://backend-gamma-nine-32.vercel.app/api/reports/comprehensive-inactivity-cron)
          echo "Comprehensive inactivity cron response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Comprehensive inactivity cron returned non-200 status: $STATUS"
            exit 1
          fi
